<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOURS — project time tracker</title>
  <style>
    /* ── Reset & Variables ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0e;
      --surface:   #141418;
      --surface2:  #1c1c22;
      --border:    #2a2a34;
      --border2:   #3a3a48;
      --text:      #dedad2;
      --text-muted:#6a6a78;
      --accent:    #e8a23a;
      --accent-dim:#7a4e10;
      --green:     #4ade80;
      --danger:    #f87171;
      --font:      ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Monaco, 'Courier New', monospace;
      --radius:    4px;
      --transition: 120ms ease;
    }

    html { font-size: 14px; }

    /* Scale up the base font at wider viewports so everything breathes */
    @media (min-width: 768px)  { html { font-size: 15px; } }
    @media (min-width: 1024px) { html { font-size: 16px; } }
    @media (min-width: 1440px) { html { font-size: 17px; } }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 2rem 5rem;
      line-height: 1.5;
    }

    /* ── Scanline texture ────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Background canvas ────────────────────────────────────────────── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 700ms ease;
    }
    #bg-canvas.visible { opacity: 1; }

    /* ── Hyperspace flash ────────────────────────────────────────────── */
    #hyperspace-flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 2;
      transition: opacity 100ms ease;
    }

    /* ── Layout container ────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      padding-top: 3rem;
    }

    @media (min-width: 768px)  { .container { max-width: 760px;  padding-top: 4rem; } }
    @media (min-width: 1024px) { .container { max-width: 860px;  padding-top: 5rem; } }
    @media (min-width: 1440px) { .container { max-width: 980px;  padding-top: 6rem; } }

    /* ── Header ──────────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
    }

    @media (min-width: 768px)  { header { padding-bottom: 1.5rem; margin-bottom: 2.5rem; } }
    @media (min-width: 1024px) { header { padding-bottom: 1.75rem; margin-bottom: 3rem; } }

    .header-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
    }

    @media (min-width: 768px)  { h1 { font-size: 1.75rem; } }
    @media (min-width: 1024px) { h1 { font-size: 2rem;    letter-spacing: 0.22em; } }

    .header-tag {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      border: 1px solid var(--border2);
      padding: 1px 6px;
      border-radius: var(--radius);
    }

    .header-sub {
      margin-top: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .header-sub span { color: var(--accent); opacity: 0.7; }

    /* ── Background picker ───────────────────────────────────────────── */
    .bg-picker {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .bg-picker-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-right: 0.1rem;
    }

    .bg-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font);
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      padding: 2px 7px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .bg-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }

    .bg-btn.active                      { border-color: var(--accent);  color: var(--accent);  background: rgba(232,162,58,0.08); }
    .bg-btn.active[data-bg="stars"]     { border-color: #7ab4ff;        color: #7ab4ff;        background: rgba(122,180,255,0.07); }
    .bg-btn.active[data-bg="matrix"]    { border-color: #00e840;        color: #00e840;        background: rgba(0,232,64,0.06); }
    .bg-btn.active[data-bg="killbill"]  { border-color: #ffe100;        color: #ffe100;        background: rgba(255,225,0,0.08); }
    .bg-btn.active[data-bg="kitty"]     { border-color: #ff6b9d;        color: #ff6b9d;        background: rgba(255,107,157,0.08); }
    .bg-btn.active[data-bg="cats"]      { border-color: #ffb347;        color: #ffb347;        background: rgba(255,179,71,0.08); }

    /* ── Add-project form ────────────────────────────────────────────── */
    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    @media (min-width: 768px)  { .add-form { gap: 0.65rem; margin-bottom: 2.5rem; } }
    @media (min-width: 1024px) { .add-form { gap: 0.75rem; margin-bottom: 3rem;   } }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.875rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color var(--transition);
    }
    .add-form input::placeholder { color: var(--text-muted); }
    .add-form input:focus { border-color: var(--accent); }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border-radius: var(--radius);
      border: 1px solid transparent;
      padding: 0.6rem 1rem;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      white-space: nowrap;
      user-select: none;
    }

    .btn-primary { background: var(--accent); color: #0c0c0e; border-color: var(--accent); }
    .btn-primary:hover  { background: #f0b050; border-color: #f0b050; }
    .btn-primary:active { background: #d08820; }

    .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .btn-ghost:hover  { color: var(--text); border-color: var(--border2); background: var(--surface2); }
    .btn-ghost:active { background: var(--surface); }

    .btn-danger {
      background: transparent; color: var(--danger); border-color: transparent;
      padding: 0.4rem 0.5rem; font-size: 0.75rem; opacity: 0.4;
    }
    .btn-danger:hover { opacity: 1; border-color: var(--danger); }

    /* ── Sort controls ────────────────────────────────────────────────── */
    .sort-bar {
      display: flex; align-items: center; gap: 0.4rem;
      margin-bottom: 1rem; font-size: 0.72rem;
    }
    .sort-label {
      color: var(--text-muted); letter-spacing: 0.08em;
      text-transform: uppercase; margin-right: 0.1rem;
    }
    .sort-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); font-family: var(--font);
      font-size: 0.72rem; letter-spacing: 0.04em;
      padding: 2px 8px; border-radius: var(--radius);
      cursor: pointer; transition: all var(--transition);
    }
    .sort-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .sort-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,162,58,0.08); }

    /* ── Empty state ─────────────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-muted); font-size: 0.8rem; letter-spacing: 0.04em;
      border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .empty-state .empty-icon { font-size: 2rem; display: block; margin-bottom: 0.75rem; opacity: 0.5; }
    .empty-state strong { display: block; color: var(--text); margin-bottom: 0.3rem; font-size: 0.875rem; }

    /* ── Project list & card ──────────────────────────────────────────── */
    #project-list { display: flex; flex-direction: column; gap: 0.5rem; }

    @media (min-width: 768px)  { #project-list { gap: 0.65rem; } }
    @media (min-width: 1024px) { #project-list { gap: 0.75rem; } }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      transition: border-color var(--transition);
      animation: slide-in 180ms ease both;
    }
    .project-card:hover { border-color: var(--border2); }

    @media (min-width: 768px)  { .project-card { padding: 1rem 1.25rem; } }
    @media (min-width: 1024px) { .project-card { padding: 1.1rem 1.5rem; border-radius: 6px; } }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .project-card.bump .hours-display { animation: bump 300ms ease; }
    @keyframes bump {
      0%  { transform: scale(1); }
      40% { transform: scale(1.18); color: var(--green); }
      100%{ transform: scale(1); }
    }

    .card-top {
      display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem;
    }

    .project-name {
      flex: 1; font-size: 0.875rem; font-weight: 600; letter-spacing: 0.03em;
      color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .project-name-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--accent);
      border-radius: var(--radius); color: var(--text); font-family: var(--font);
      font-size: 0.875rem; font-weight: 600; padding: 0.15rem 0.4rem; outline: none;
    }

    .hours-display {
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      letter-spacing: 0.05em; min-width: 4.5rem; text-align: right; display: inline-block;
    }

    @media (min-width: 768px)  { .hours-display { font-size: 1.25rem; min-width: 5rem; } }
    @media (min-width: 1024px) { .hours-display { font-size: 1.4rem;  min-width: 5.5rem; } }
    .hours-unit { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.06em; }

    .card-actions { display: flex; gap: 0.4rem; align-items: center; }
    .card-actions .spacer { flex: 1; }

    .btn-hour {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      font-family: var(--font); font-size: 0.78rem; font-weight: 700;
      padding: 0.35rem 0.65rem; border-radius: var(--radius); cursor: pointer;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
      letter-spacing: 0.04em;
    }
    .btn-hour:hover  { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .btn-hour:active { background: var(--accent); color: #0c0c0e; }

    @media (min-width: 768px)  { .btn-hour { font-size: 0.85rem; padding: 0.45rem 0.85rem; } }
    @media (min-width: 1024px) { .btn-hour { font-size: 0.9rem;  padding: 0.5rem  1rem;   } }

    .btn-edit {
      background: transparent; border: 1px solid transparent; color: var(--text-muted);
      font-family: var(--font); font-size: 0.75rem; padding: 0.35rem 0.5rem;
      border-radius: var(--radius); cursor: pointer; transition: all var(--transition); opacity: 0.45;
    }
    .btn-edit:hover { opacity: 1; border-color: var(--border2); background: var(--surface2); }

    .custom-hour-input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: var(--font);
      font-size: 0.78rem; font-weight: 700; width: 3.8rem; padding: 0.35rem 0.4rem;
      text-align: center; outline: none; transition: border-color var(--transition);
      -moz-appearance: textfield;
    }
    .custom-hour-input::-webkit-inner-spin-button,
    .custom-hour-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .custom-hour-input::placeholder { color: var(--text-muted); font-weight: 400; }
    .custom-hour-input:focus { border-color: var(--accent); }

    .btn-log-custom {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
      font-family: var(--font); font-size: 0.72rem; font-weight: 600;
      padding: 0.35rem 0.5rem; border-radius: var(--radius); cursor: pointer;
      transition: all var(--transition); letter-spacing: 0.03em;
    }
    .btn-log-custom:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .last-logged {
      font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.03em;
      margin-top: 0.15rem; opacity: 0.7;
    }

    .undo-hint {
      font-size: 0.7rem; color: var(--text-muted); margin-top: 0.35rem;
      opacity: 0; transition: opacity 200ms ease; letter-spacing: 0.03em; height: 1rem;
    }
    .undo-hint.visible { opacity: 1; }

    .undo-link {
      color: var(--accent); cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
    }

    /* ── Toast ───────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
      font-family: var(--font); font-size: 0.78rem; letter-spacing: 0.04em;
      padding: 0.5rem 1rem; border-radius: var(--radius);
      opacity: 0; pointer-events: none;
      transition: opacity 200ms ease, transform 200ms ease;
      z-index: 10000; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Footer ──────────────────────────────────────────────────────── */
    .footer-bar {
      margin-top: 2.5rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between; gap: 0.5rem; flex-wrap: wrap;
    }
    .footer-stat { font-size: 0.72rem; color: var(--text-muted); letter-spacing: 0.05em; }
    .footer-stat strong { color: var(--accent); opacity: 0.85; }
    .footer-actions { display: flex; gap: 0.4rem; }

    /* ── Confirm overlay ─────────────────────────────────────────────── */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72); z-index: 200;
      align-items: center; justify-content: center;
    }
    #overlay.open { display: flex; }

    .confirm-box {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 1.5rem;
      max-width: 320px; width: 90%; font-size: 0.85rem;
    }
    .confirm-box p { margin-bottom: 1rem; line-height: 1.6; }
    .confirm-box strong { color: var(--danger); }
    .confirm-box .confirm-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }

    /* ── Color dot ────────────────────────────────────────────────────── */
    .color-dot {
      width: 10px; height: 10px; border-radius: 50%; cursor: pointer;
      flex-shrink: 0; transition: transform var(--transition);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .color-dot:hover { transform: scale(1.4); }

    /* ── Note input ───────────────────────────────────────────────────── */
    .note-row { margin-top: 0.35rem; }
    .note-input {
      background: transparent; border: none;
      border-bottom: 1px dashed var(--border);
      color: var(--text-muted); font-family: var(--font);
      font-size: 0.72rem; padding: 0.2rem 0; width: 100%;
      outline: none; transition: border-color var(--transition), color var(--transition);
    }
    .note-input::placeholder { color: var(--text-muted); opacity: 0.4; }
    .note-input:focus { border-bottom-color: var(--accent); border-bottom-style: solid; color: var(--text); }

    /* ── Chart ────────────────────────────────────────────────────────── */
    .chart-section {
      margin-top: 2rem; padding: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .chart-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 1rem;
    }
    .chart-title {
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.1em; color: var(--text-muted);
      text-transform: uppercase;
    }
    .chart-toggle { display: flex; gap: 0.25rem; }
    .chart-toggle-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); font-family: var(--font);
      font-size: 0.68rem; padding: 2px 8px;
      border-radius: var(--radius); cursor: pointer;
      transition: all var(--transition);
    }
    .chart-toggle-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .chart-toggle-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,162,58,0.08); }
    .chart-container {
      display: flex; align-items: flex-end; gap: 4px;
      min-height: 120px;
    }
    .chart-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 0.2rem;
    }
    .chart-bar {
      width: 100%; display: flex; flex-direction: column;
      justify-content: flex-end;
      border-radius: 3px 3px 0 0; overflow: hidden; min-height: 0;
    }
    .chart-seg { width: 100%; opacity: 0.85; }
    .chart-seg:first-child { border-radius: 3px 3px 0 0; }
    .chart-total {
      font-size: 0.58rem; color: var(--text-muted);
      letter-spacing: 0.02em; min-height: 0.9em;
    }
    .chart-label {
      font-size: 0.6rem; color: var(--text-muted);
      letter-spacing: 0.02em; white-space: nowrap;
    }
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 0.5rem 0.75rem;
      margin-top: 0.75rem; padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }
    .chart-legend-item {
      display: flex; align-items: center; gap: 0.25rem;
      font-size: 0.62rem; color: var(--text-muted);
    }
    .chart-legend-dot {
      width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
    }
    .chart-empty {
      text-align: center; padding: 1.5rem;
      color: var(--text-muted); font-size: 0.75rem;
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 420px) {
      h1 { font-size: 1.2rem; }
      .hours-display { font-size: 1rem; min-width: 3.5rem; }
      .btn-hour { padding: 0.35rem 0.5rem; font-size: 0.75rem; }
      .bg-picker-label { display: none; }
      body { padding: 0 0.75rem 4rem; }
    }
  </style>
</head>
<body>

<!-- Backgrounds render behind everything -->
<canvas id="bg-canvas"></canvas>
<div id="hyperspace-flash"></div>

<div class="container">

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header>
    <div class="header-top">
      <h1>HOURS</h1>
      <a class="header-tag" id="version-tag" href="#" title="Commit">v1</a>

      <div class="bg-picker" id="bg-picker">
        <span class="bg-picker-label">bg</span>
        <button class="bg-btn active" data-bg="none"     title="Plain dark">off</button>
        <button class="bg-btn"        data-bg="stars"    title="Star Wars starfield">✦ stars</button>
        <button class="bg-btn"        data-bg="matrix"   title="Matrix digital rain">⬛ matrix</button>
        <button class="bg-btn"        data-bg="killbill" title="Kill Bill">⚔ kill bill</button>
        <button class="bg-btn"        data-bg="kitty"    title="Hello Kitty">🎀 kitty</button>
        <button class="bg-btn"        data-bg="cats"     title="Cats everywhere">🐱 cats</button>
      </div>
    </div>
    <p class="header-sub">your time matters. log it. <span>◆</span> or it never happened.</p>
  </header>

  <!-- ── Add project form ────────────────────────────────────────────── -->
  <div class="add-form">
    <input id="project-input" type="text" maxlength="64"
           placeholder="new project name..." autocomplete="off" spellcheck="false" />
    <button class="btn btn-primary" id="add-btn">+ add</button>
  </div>

  <!-- ── Sort controls ───────────────────────────────────────────────── -->
  <div class="sort-bar" id="sort-bar" style="display:none">
    <span class="sort-label">sort</span>
    <button class="sort-btn active" data-sort="none">default</button>
    <button class="sort-btn" data-sort="hours">hours ↓</button>
    <button class="sort-btn" data-sort="alpha">A → Z</button>
  </div>

  <!-- ── Project list ────────────────────────────────────────────────── -->
  <div id="project-list"></div>

  <!-- ── Chart ───────────────────────────────────────────────────────── -->
  <div class="chart-section" id="chart-section" style="display:none">
    <div class="chart-header">
      <span class="chart-title">TIME CHART</span>
      <div class="chart-toggle" id="chart-toggle">
        <button class="chart-toggle-btn active" data-range="week">7 days</button>
        <button class="chart-toggle-btn" data-range="month">4 weeks</button>
      </div>
    </div>
    <div id="chart-container" class="chart-container"></div>
  </div>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <div class="footer-bar" id="footer-bar" style="display:none">
    <span class="footer-stat" id="footer-stat"></span>
    <div class="footer-actions">
      <button class="btn btn-ghost" id="export-btn">↓ json</button>

/* ─────────────────────────────────────────────────────────────────────────

// ══════════════════════════════════════════════════════════════════════════
//  BACKGROUND: STAR WARS
//  Parallax starfield with depth-layered drift + periodic hyperspace jump
// ══════════════════════════════════════════════════════════════════════════

class StarWarsBg {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.stars  = [];
    this.nebulae = [];
    this.raf    = null;
    this.hyperProgress  = 0;   // > 0 means jump is playing
    this.hyperDuration  = 150; // frames (~2.5s at 60fps)
    this.hyperTimer     = null;
    this.resize();
  }

  resize() {
    this.canvas.width  = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this._mkStars();
    this._mkNebulae();
  }

  _mkStars() {
    this.stars = [];
    // density scales with screen area, capped at 500
    const n = Math.min(500, Math.floor(window.innerWidth * window.innerHeight / 3200));
    for (let i = 0; i < n; i++) this.stars.push(this._newStar());
  }

  _newStar() {
    const z = Math.random();   // 0 = distant/dim/slow, 1 = close/bright/fast
    // subtle palette: cool white, faint blue, faint warm
    const palettes = ['220,228,248', '200,215,255', '255,248,220', '240,235,255'];
    const rgb = palettes[Math.floor(Math.random() * palettes.length)];
    return {
      x: Math.random() * this.canvas.width,
      y: Math.random() * this.canvas.height,
      z,
      baseR:      0.35 + z * 1.5,
      brightness: 0.15 + z * 0.85,
      twPhase:    Math.random() * Math.PI * 2,
      twSpeed:    0.007 + Math.random() * 0.022,
      driftX:     (Math.random() - 0.5) * 0.012 * (z + 0.05),
      driftY:     (Math.random() - 0.5) * 0.005 * (z + 0.05),
      rgb,
    };
  }

  _mkNebulae() {
    this.nebulae = [];
    const palettes = [
      '55,30,110',   // deep violet
      '15,55,95',    // navy
      '70,15,50',    // dark crimson
      '10,35,75',    // midnight blue
      '40,60,20',    // dark olive (rare)
    ];
    for (let i = 0; i < 5; i++) {
      this.nebulae.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        r: 100 + Math.random() * 260,
        a: 0.035 + Math.random() * 0.065,
        rgb: palettes[i % palettes.length],
      });
    }
  }

  _scheduleJump() {
    const delay = 13000 + Math.random() * 12000; // every 13–25s
    this.hyperTimer = setTimeout(() => {
      if (this.raf) {
        this.hyperProgress = 1;
        // brief white flash on the page
        const fl = document.getElementById('hyperspace-flash');
        fl.style.opacity = '0.18';
        setTimeout(() => { fl.style.opacity = '0'; }, 110);
        this._scheduleJump();
      }
    }, delay);
  }

  _drawNebulae() {
    const { ctx } = this;
    this.nebulae.forEach(n => {
      const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0,   `rgba(${n.rgb},${n.a})`);
      g.addColorStop(0.55,`rgba(${n.rgb},${n.a * 0.35})`);
      g.addColorStop(1,   `rgba(${n.rgb},0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  _drawStarsNormal() {
    const { ctx } = this;
    this.stars.forEach(s => {
      s.twPhase += s.twSpeed;
      s.x += s.driftX;
      s.y += s.driftY;
      // wrap
      if (s.x < 0)                    s.x = this.canvas.width;
      if (s.x > this.canvas.width)    s.x = 0;
      if (s.y < 0)                    s.y = this.canvas.height;
      if (s.y > this.canvas.height)   s.y = 0;

      const tw    = 0.72 + 0.28 * Math.sin(s.twPhase);
      const alpha = s.brightness * tw;
      const r     = s.baseR * (0.65 + 0.35 * tw);

      // Glow for bright foreground stars
      if (s.z > 0.82 && s.brightness > 0.75) {
        ctx.shadowColor = `rgba(${s.rgb},0.55)`;
        ctx.shadowBlur  = 5;
      }

      ctx.fillStyle = `rgba(${s.rgb},${alpha.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    });
  }

  _drawStarsHyperspace(intensity) {
    // intensity: sin curve 0→1→0 over the jump duration
    const { ctx, canvas } = this;
    const cx = canvas.width  / 2;
    const cy = canvas.height / 2;

    this.stars.forEach(s => {
      const dx   = s.x - cx;
      const dy   = s.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy) + 0.5;
      const nx   = dx / dist;
      const ny   = dy / dist;

      // Close/bright stars stretch farther; central stars barely move
      const depthFactor = 0.25 + s.z * 0.75;
      const streakLen   = intensity * depthFactor * dist * 0.6;
      const x2          = s.x + nx * streakLen;
      const y2          = s.y + ny * streakLen;
      const alpha       = Math.min(1, s.brightness * (0.5 + intensity * 0.5));
      const lw          = s.baseR * (0.8 + intensity * 2.5);

      ctx.save();
      ctx.lineWidth   = Math.max(0.4, lw);
      ctx.shadowColor = `rgba(180,215,255,${intensity * 0.5})`;
      ctx.shadowBlur  = intensity * 8;

      // Streak: bright white head fading to star colour
      const g = ctx.createLinearGradient(s.x, s.y, x2, y2);
      g.addColorStop(0,   `rgba(255,255,255,${alpha})`);
      g.addColorStop(0.3, `rgba(${s.rgb},${alpha * 0.8})`);
      g.addColorStop(1,   `rgba(${s.rgb},0)`);
      ctx.strokeStyle = g;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    });
  }

  draw() {
    const { ctx, canvas } = this;
    ctx.fillStyle = '#00000e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    this._drawNebulae();

    if (this.hyperProgress > 0) {
      const t         = this.hyperProgress / this.hyperDuration;
      const intensity = Math.sin(t * Math.PI); // 0→peak→0
      this._drawStarsHyperspace(intensity);
      this.hyperProgress++;
      if (this.hyperProgress > this.hyperDuration) this.hyperProgress = 0;
    } else {
      this._drawStarsNormal();
    }
  }

  start() {
    this._scheduleJump();
    const loop = () => { this.draw(); this.raf = requestAnimationFrame(loop); };
    this.raf = requestAnimationFrame(loop);
  }

  stop() {
    cancelAnimationFrame(this.raf);
    clearTimeout(this.hyperTimer);
    this.raf = null;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    document.getElementById('hyperspace-flash').style.opacity = '0';
  }
}


// ══════════════════════════════════════════════════════════════════════════
//  BACKGROUND: MATRIX
//  Classic Katakana + symbol digital rain, green on black
// ══════════════════════════════════════════════════════════════════════════

class MatrixBg {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.drops  = [];
    this.raf    = null;
    this.fs     = 14; // font size (px) = column width
    // Full character set: Katakana block + half-width katakana + latin + digits + symbols
    this.glyphs = (
      'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン' +
      'ヴァィゥェォッャュョ' +
      '0123456789' +
      'ABCDEFGHIJKLMNOPQRSTUVWXYZ' +
      '!"#$%&\'()*+,-./:;<=>?@[\\]^_`{|}~'
    );
    this.resize();
  }

  resize() {
    this.canvas.width  = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this._initDrops();
  }

  _initDrops() {
    const cols = Math.floor(this.canvas.width / this.fs);
    this.drops = [];
    for (let i = 0; i < cols; i++) {
      // Stagger: start columns above the screen at random heights
      this.drops[i] = -(Math.random() * (this.canvas.height / this.fs));
    }
  }

  _glyph() {
    return this.glyphs[Math.floor(Math.random() * this.glyphs.length)];
  }

  draw() {
    const { ctx, canvas, drops, fs } = this;

    // Fade the previous frame — this IS the trail effect.
    // Lower alpha = longer trail; higher = shorter. 0.045 ≈ classic Matrix look.
    ctx.fillStyle = 'rgba(0, 0, 0, 0.045)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = `${fs}px monospace`;

    drops.forEach((y, i) => {
      const x   = i * fs;
      const yPx = Math.floor(y) * fs;

      // Only draw when on-screen
      if (yPx >= 0 && yPx <= canvas.height + fs) {
        // ── Leading character: near-white with electric glow
        ctx.fillStyle  = '#ccffcc';
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur  = 12;
        ctx.fillText(this._glyph(), x, yPx);
        ctx.shadowBlur  = 0;

        // ── Second character: bright classic Matrix green
        const y2 = (Math.floor(y) - 1) * fs;
        if (y2 >= 0) {
          ctx.fillStyle = '#00ff41';
          ctx.fillText(this._glyph(), x, y2);
        }
      }

      // Advance drop
      drops[i] += 0.45 + Math.random() * 0.55;

      // Reset column once it exits the bottom, with some randomness for stagger
      if (drops[i] * fs > canvas.height + fs * 5 && Math.random() > 0.974) {
        drops[i] = -(5 + Math.random() * 25);
      }
    });
  }

  start() {
    const loop = () => { this.draw(); this.raf = requestAnimationFrame(loop); };
    this.raf = requestAnimationFrame(loop);
  }

  stop() {
    cancelAnimationFrame(this.raf);
    this.raf = null;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  }
}


// ══════════════════════════════════════════════════════════════════════════
//  BACKGROUND: KILL BILL
//  Big katanas with blood splatter trails behind them
// ══════════════════════════════════════════════════════════════════════════

class KillBillBg {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.raf = null;
    this.katanas = [];
    this.splats = [];
    this.t = 0;
    this.resize();
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this._initKatanas();
    this._initSplats();
  }

  _initKatanas() {
    this.katanas = [];
    const n = 5 + Math.floor(this.canvas.width / 300);
    for (let i = 0; i < n; i++) this.katanas.push(this._newKatana());
  }

  _newKatana() {
    const w = this.canvas.width, h = this.canvas.height;
    const scale = 0.6 + Math.random() * 1.2;
    return {
      x: Math.random() * w,
      y: Math.random() * h,
      angle: -0.8 + Math.random() * 1.6,
      scale,
      bladeLen: 120 * scale + Math.random() * 80 * scale,
      speed: 0.3 + Math.random() * 0.7,
      dir: Math.random() < 0.5 ? -1 : 1,
      drift: (Math.random() - 0.5) * 0.2,
      alpha: 0.06 + Math.random() * 0.1,
      phase: Math.random() * Math.PI * 2,
    };
  }

  _initSplats() {
    this.splats = [];
    const n = 12 + Math.floor(this.canvas.width / 120);
    for (let i = 0; i < n; i++) {
      this.splats.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        r: 25 + Math.random() * 80,
        a: 0.04 + Math.random() * 0.08,
        splatShapes: Array.from({length: 4 + Math.floor(Math.random() * 6)}, () => ({
          angle: Math.random() * Math.PI * 2,
          dist: Math.random() * 0.8,
          rx: 8 + Math.random() * 25,
          ry: 4 + Math.random() * 12,
          rot: Math.random() * Math.PI,
        })),
        drips: Array.from({length: 2 + Math.floor(Math.random() * 5)}, () => ({
          dx: (Math.random() - 0.5) * 40,
          len: 20 + Math.random() * 100,
          w: 2 + Math.random() * 5,
          delay: Math.random() * 0.4,
        })),
      });
    }
  }

  _drawKatana(k) {
    const { ctx } = this;
    ctx.save();
    ctx.translate(k.x, k.y);
    ctx.rotate(k.angle);
    ctx.globalAlpha = k.alpha;

    const bl = k.bladeLen;
    const bw = 6 * k.scale;
    const handleLen = 40 * k.scale;
    const guardR = 8 * k.scale;

    // Blood trail behind blade
    const trailGrad = ctx.createLinearGradient(-handleLen, 0, bl, 0);
    trailGrad.addColorStop(0, 'rgba(140,0,0,0)');
    trailGrad.addColorStop(0.3, `rgba(180,10,10,${k.alpha * 1.5})`);
    trailGrad.addColorStop(0.7, `rgba(200,0,0,${k.alpha * 2})`);
    trailGrad.addColorStop(1, 'rgba(120,0,0,0)');
    ctx.fillStyle = trailGrad;
    ctx.beginPath();
    ctx.moveTo(0, -bw * 3);
    ctx.quadraticCurveTo(bl * 0.5, -bw * 4, bl * 1.1, -bw * 0.5);
    ctx.lineTo(bl * 1.1, bw * 0.5);
    ctx.quadraticCurveTo(bl * 0.5, bw * 4, 0, bw * 3);
    ctx.closePath();
    ctx.fill();

    // Blade — silver gradient
    const bladeGrad = ctx.createLinearGradient(0, -bw, 0, bw);
    bladeGrad.addColorStop(0, `rgba(200,210,220,0.9)`);
    bladeGrad.addColorStop(0.3, `rgba(240,245,250,1)`);
    bladeGrad.addColorStop(0.5, `rgba(255,255,255,1)`);
    bladeGrad.addColorStop(0.7, `rgba(200,210,220,0.9)`);
    bladeGrad.addColorStop(1, `rgba(160,170,180,0.7)`);
    ctx.fillStyle = bladeGrad;
    ctx.beginPath();
    ctx.moveTo(0, -bw * 0.5);
    ctx.lineTo(bl - 10 * k.scale, -bw * 0.35);
    ctx.quadraticCurveTo(bl + 5 * k.scale, 0, bl - 10 * k.scale, bw * 0.35);
    ctx.lineTo(0, bw * 0.5);
    ctx.closePath();
    ctx.fill();

    // Edge highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, -bw * 0.5);
    ctx.lineTo(bl - 10 * k.scale, -bw * 0.35);
    ctx.quadraticCurveTo(bl + 5 * k.scale, 0, bl - 10 * k.scale, bw * 0.35);
    ctx.stroke();

    // Hamon line (wavy temper line on blade)
    ctx.strokeStyle = 'rgba(180,190,200,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bl * 0.05, bw * 0.15);
    for (let i = 0; i < 8; i++) {
      const px = bl * 0.05 + (i / 7) * bl * 0.85;
      const py = bw * 0.15 + Math.sin(i * 1.3 + k.phase) * bw * 0.12;
      ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Guard (tsuba)
    ctx.fillStyle = '#3a3020';
    ctx.strokeStyle = '#8a7550';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, guardR, guardR * 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Handle (tsuka) with wrapping pattern
    ctx.fillStyle = '#1a1008';
    ctx.fillRect(-handleLen, -bw * 0.6, handleLen, bw * 1.2);
    // Diamond wrap
    ctx.strokeStyle = '#6a5a30';
    ctx.lineWidth = 1;
    const wrapSpacing = 8 * k.scale;
    for (let i = 0; i < handleLen / wrapSpacing; i++) {
      const wx = -i * wrapSpacing;
      ctx.beginPath();
      ctx.moveTo(wx, -bw * 0.6); ctx.lineTo(wx - wrapSpacing * 0.5, 0);
      ctx.lineTo(wx, bw * 0.6);
      ctx.stroke();
    }

    // Pommel
    ctx.fillStyle = '#4a3a18';
    ctx.beginPath();
    ctx.arc(-handleLen, 0, bw * 0.7, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  draw() {
    const { ctx, canvas } = this;
    this.t++;

    // Pure black background
    ctx.fillStyle = '#080400';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw blood splats
    this.splats.forEach(s => {
      ctx.save();
      ctx.translate(s.x, s.y);
      // Main splat blob
      ctx.fillStyle = `rgba(160,0,0,${s.a})`;
      ctx.beginPath();
      ctx.arc(0, 0, s.r * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Irregular splash shapes
      s.splatShapes.forEach(sh => {
        const sx = Math.cos(sh.angle) * s.r * sh.dist;
        const sy = Math.sin(sh.angle) * s.r * sh.dist;
        ctx.fillStyle = `rgba(140,0,0,${s.a * 0.7})`;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(sh.rot);
        ctx.beginPath();
        ctx.ellipse(0, 0, sh.rx, sh.ry, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
      // Drips running down
      s.drips.forEach(d => {
        const dripLen = d.len;
        const grad = ctx.createLinearGradient(0, 0, 0, dripLen);
        grad.addColorStop(0, `rgba(150,0,0,${s.a})`);
        grad.addColorStop(1, `rgba(100,0,0,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(d.dx - d.w/2, s.r * 0.2);
        ctx.lineTo(d.dx + d.w/2, s.r * 0.2);
        ctx.lineTo(d.dx + d.w * 0.3, s.r * 0.2 + dripLen);
        ctx.lineTo(d.dx - d.w * 0.3, s.r * 0.2 + dripLen);
        ctx.fill();
        // Drip tip
        ctx.fillStyle = `rgba(130,0,0,${s.a * 0.5})`;
        ctx.beginPath();
        ctx.arc(d.dx, s.r * 0.2 + dripLen, d.w * 0.5, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    });

    // Move & draw katanas
    this.katanas.forEach(k => {
      k.x += k.speed * k.dir;
      k.y += k.drift;
      k.phase += 0.02;
      if (k.x < -k.bladeLen * 2) k.x = canvas.width + k.bladeLen;
      if (k.x > canvas.width + k.bladeLen * 2) k.x = -k.bladeLen;
      if (k.y < -100) k.y = canvas.height + 50;
      if (k.y > canvas.height + 100) k.y = -50;
      this._drawKatana(k);
    });
  }

  start() {
    const loop = () => { this.draw(); this.raf = requestAnimationFrame(loop); };
    this.raf = requestAnimationFrame(loop);
  }

  stop() {
    cancelAnimationFrame(this.raf);
    this.raf = null;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  }
}


// ══════════════════════════════════════════════════════════════════════════
//  BACKGROUND: HELLO KITTY
//  Big Kitty face icons, floating bows, hearts, and flower petals
// ══════════════════════════════════════════════════════════════════════════

class HelloKittyBg {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.raf = null;
    this.items = [];
    this.kitties = [];
    this.t = 0;
    this.resize();
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this._initItems();
    this._initKitties();
  }

  _initItems() {
    this.items = [];
    const n = Math.min(50, Math.floor(this.canvas.width * this.canvas.height / 18000));
    for (let i = 0; i < n; i++) this.items.push(this._newItem());
  }

  _initKitties() {
    this.kitties = [];
    const n = 6 + Math.floor(this.canvas.width / 200);
    for (let i = 0; i < n; i++) {
      this.kitties.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        size: 35 + Math.random() * 55,
        speed: 0.1 + Math.random() * 0.25,
        drift: (Math.random() - 0.5) * 0.15,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.005 + Math.random() * 0.01,
        alpha: 0.06 + Math.random() * 0.08,
        bowHue: Math.random() < 0.6 ? 350 : 280 + Math.random() * 40,
        tilt: (Math.random() - 0.5) * 0.3,
      });
    }
  }

  _newItem() {
    const types = ['heart','bow','flower','star'];
    return {
      type: types[Math.floor(Math.random() * types.length)],
      x: Math.random() * this.canvas.width,
      y: Math.random() * this.canvas.height,
      size: 8 + Math.random() * 18,
      speed: 0.15 + Math.random() * 0.4,
      drift: (Math.random() - 0.5) * 0.3,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.01 + Math.random() * 0.02,
      alpha: 0.08 + Math.random() * 0.14,
      hue: Math.random() < 0.7 ? 340 + Math.random() * 20 : 280 + Math.random() * 60,
    };
  }

  _drawKittyFace(x, y, size, alpha, bowHue, tilt) {
    const ctx = this.ctx;
    const s = size;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(tilt);
    ctx.globalAlpha = alpha;

    // Face — oval
    ctx.fillStyle = '#fff5ee';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.5, s * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();

    // Left ear
    ctx.beginPath();
    ctx.moveTo(-s * 0.42, -s * 0.2);
    ctx.lineTo(-s * 0.55, -s * 0.65);
    ctx.lineTo(-s * 0.15, -s * 0.4);
    ctx.closePath();
    ctx.fill();
    // Inner ear
    ctx.fillStyle = `hsla(${bowHue},70%,75%,0.5)`;
    ctx.beginPath();
    ctx.moveTo(-s * 0.38, -s * 0.25);
    ctx.lineTo(-s * 0.48, -s * 0.55);
    ctx.lineTo(-s * 0.2, -s * 0.38);
    ctx.closePath();
    ctx.fill();

    // Right ear
    ctx.fillStyle = '#fff5ee';
    ctx.beginPath();
    ctx.moveTo(s * 0.42, -s * 0.2);
    ctx.lineTo(s * 0.55, -s * 0.65);
    ctx.lineTo(s * 0.15, -s * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = `hsla(${bowHue},70%,75%,0.5)`;
    ctx.beginPath();
    ctx.moveTo(s * 0.38, -s * 0.25);
    ctx.lineTo(s * 0.48, -s * 0.55);
    ctx.lineTo(s * 0.2, -s * 0.38);
    ctx.closePath();
    ctx.fill();

    // Eyes — two small ovals
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(-s * 0.15, -s * 0.06, s * 0.045, s * 0.055, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 0.15, -s * 0.06, s * 0.045, s * 0.055, 0, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    ctx.fillStyle = `hsla(40,80%,60%,0.8)`;
    ctx.beginPath();
    ctx.ellipse(0, s * 0.06, s * 0.04, s * 0.03, 0, 0, Math.PI * 2);
    ctx.fill();

    // Whiskers
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    // Left
    ctx.beginPath(); ctx.moveTo(-s * 0.18, s * 0.05); ctx.lineTo(-s * 0.5, -s * 0.02); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * 0.18, s * 0.08); ctx.lineTo(-s * 0.48, s * 0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s * 0.18, s * 0.11); ctx.lineTo(-s * 0.46, s * 0.22); ctx.stroke();
    // Right
    ctx.beginPath(); ctx.moveTo(s * 0.18, s * 0.05); ctx.lineTo(s * 0.5, -s * 0.02); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * 0.18, s * 0.08); ctx.lineTo(s * 0.48, s * 0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s * 0.18, s * 0.11); ctx.lineTo(s * 0.46, s * 0.22); ctx.stroke();

    // Bow on right ear
    ctx.fillStyle = `hsla(${bowHue},85%,65%,0.9)`;
    const bx = s * 0.45, by = -s * 0.4;
    ctx.beginPath();
    ctx.ellipse(bx - s * 0.1, by, s * 0.12, s * 0.07, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bx + s * 0.1, by, s * 0.12, s * 0.07, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsla(${bowHue},80%,55%,0.9)`;
    ctx.beginPath();
    ctx.arc(bx, by, s * 0.04, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  _drawHeart(x, y, s, alpha, hue) {
    const ctx = this.ctx;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = `hsla(${hue},80%,70%,${alpha})`;
    ctx.beginPath();
    ctx.moveTo(0, s * 0.3);
    ctx.bezierCurveTo(-s * 0.5, -s * 0.3, -s, s * 0.1, 0, s);
    ctx.bezierCurveTo(s, s * 0.1, s * 0.5, -s * 0.3, 0, s * 0.3);
    ctx.fill();
    ctx.restore();
  }

  _drawBow(x, y, s, alpha, hue) {
    const ctx = this.ctx;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = `hsla(${hue},85%,68%,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(-s * 0.4, 0, s * 0.45, s * 0.28, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 0.4, 0, s * 0.45, s * 0.28, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `hsla(${hue},80%,60%,${alpha})`;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  _drawFlower(x, y, s, alpha, hue) {
    const ctx = this.ctx;
    ctx.save();
    ctx.translate(x, y);
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2;
      const px = Math.cos(angle) * s * 0.35;
      const py = Math.sin(angle) * s * 0.35;
      ctx.fillStyle = `hsla(${hue},75%,75%,${alpha})`;
      ctx.beginPath();
      ctx.arc(px, py, s * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = `hsla(50,80%,75%,${alpha})`;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  _drawStar(x, y, s, alpha, hue) {
    const ctx = this.ctx;
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = `hsla(${hue},70%,80%,${alpha})`;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      ctx[i === 0 ? 'moveTo' : 'lineTo'](Math.cos(a) * s * 0.5, Math.sin(a) * s * 0.5);
      const b = a + (2 * Math.PI) / 5;
      ctx.lineTo(Math.cos(b) * s * 0.2, Math.sin(b) * s * 0.2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  draw() {
    const { ctx, canvas } = this;
    this.t++;

    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#1a0a14');
    grad.addColorStop(0.5, '#160812');
    grad.addColorStop(1, '#0e0618');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw big kitty faces
    this.kitties.forEach(k => {
      k.y -= k.speed;
      k.wobble += k.wobbleSpeed;
      k.x += k.drift + Math.sin(k.wobble) * 0.2;
      if (k.y < -k.size) { k.y = canvas.height + k.size; k.x = Math.random() * canvas.width; }
      if (k.x < -k.size) k.x = canvas.width + k.size;
      if (k.x > canvas.width + k.size) k.x = -k.size;
      this._drawKittyFace(k.x, k.y, k.size, k.alpha, k.bowHue, k.tilt + Math.sin(k.wobble) * 0.1);
    });

    // Floating small items
    this.items.forEach(it => {
      it.y -= it.speed;
      it.wobble += it.wobbleSpeed;
      it.x += it.drift + Math.sin(it.wobble) * 0.3;
      if (it.y < -it.size * 2) { it.y = canvas.height + it.size * 2; it.x = Math.random() * canvas.width; }
      if (it.x < -it.size * 2) it.x = canvas.width + it.size;
      if (it.x > canvas.width + it.size * 2) it.x = -it.size;

      switch (it.type) {
        case 'heart':  this._drawHeart(it.x, it.y, it.size, it.alpha, it.hue); break;
        case 'bow':    this._drawBow(it.x, it.y, it.size, it.alpha, it.hue); break;
        case 'flower': this._drawFlower(it.x, it.y, it.size, it.alpha, it.hue); break;
        case 'star':   this._drawStar(it.x, it.y, it.size, it.alpha, it.hue); break;
      }
    });
  }

  start() {
    const loop = () => { this.draw(); this.raf = requestAnimationFrame(loop); };
    this.raf = requestAnimationFrame(loop);
  }

  stop() {
    cancelAnimationFrame(this.raf);
    this.raf = null;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  }
}


// ══════════════════════════════════════════════════════════════════════════
//  BACKGROUND: CATS
//  Cats walking, sitting, and sleeping everywhere. Yarn balls rolling.
// ══════════════════════════════════════════════════════════════════════════

class CatsBg {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.raf = null;
    this.cats = [];
    this.yarns = [];
    this.paws = [];
    this.t = 0;
    this.resize();
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this._initCats();
    this._initYarns();
  }

  _initCats() {
    this.cats = [];
    const n = 30 + Math.floor(this.canvas.width / 40);
    const poses = ['sit','walk','sleep','loaf'];
    const colors = ['#ffb347','#c9c9c9','#3a3a3a','#f5d5a0','#ff8c69','#b0b0b0','#f4a460','#fff5e1','#222222','#ff9966','#e0c8a8'];
    for (let i = 0; i < n; i++) {
      this.cats.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        size: 28 + Math.random() * 42,
        pose: poses[Math.floor(Math.random() * poses.length)],
        color: colors[Math.floor(Math.random() * colors.length)],
        dir: Math.random() < 0.5 ? -1 : 1,
        speed: 0.2 + Math.random() * 0.6,
        drift: (Math.random() - 0.5) * 0.15,
        phase: Math.random() * Math.PI * 2,
        alpha: 0.1 + Math.random() * 0.15,
        tailPhase: Math.random() * Math.PI * 2,
      });
    }
  }

  _initYarns() {
    this.yarns = [];
    for (let i = 0; i < 10; i++) {
      this.yarns.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        r: 8 + Math.random() * 14,
        speed: 0.3 + Math.random() * 0.6,
        dir: Math.random() < 0.5 ? -1 : 1,
        color: ['#ff6b6b','#6bc5ff','#c5ff6b','#ff6bda','#ffd36b'][Math.floor(Math.random()*5)],
        alpha: 0.12 + Math.random() * 0.1,
        roll: 0,
      });
    }
  }

  _drawCat(cat) {
    const { ctx } = this;
    const { x, y, size: s, color, alpha, dir, pose, tailPhase } = cat;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(dir, 1);
    ctx.globalAlpha = alpha;

    const darkerColor = this._darken(color, 0.7);

    if (pose === 'sleep') {
      // Curled up cat — simple circle with ears and tail
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.7, s * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Head
      ctx.beginPath();
      ctx.arc(s * 0.45, -s * 0.1, s * 0.28, 0, Math.PI * 2);
      ctx.fill();
      // Ears
      ctx.fillStyle = darkerColor;
      ctx.beginPath();
      ctx.moveTo(s * 0.35, -s * 0.35); ctx.lineTo(s * 0.5, -s * 0.55); ctx.lineTo(s * 0.6, -s * 0.3);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.55, -s * 0.3); ctx.lineTo(s * 0.65, -s * 0.52); ctx.lineTo(s * 0.72, -s * 0.25);
      ctx.fill();
      // Zzz
      ctx.fillStyle = `rgba(200,200,255,${alpha * 2})`;
      ctx.font = `${s * 0.3}px monospace`;
      const zzOff = Math.sin(this.t * 0.03 + tailPhase) * 3;
      ctx.fillText('z', s * 0.7, -s * 0.5 + zzOff);
      ctx.font = `${s * 0.22}px monospace`;
      ctx.fillText('z', s * 0.85, -s * 0.7 + zzOff * 0.7);
    } else if (pose === 'loaf') {
      // Cat loaf — rectangular body, head, no legs visible
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(-s * 0.5, -s * 0.2, s, s * 0.55, s * 0.15);
      ctx.fill();
      // Head
      ctx.beginPath();
      ctx.arc(s * 0.4, -s * 0.25, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Ears
      ctx.fillStyle = darkerColor;
      ctx.beginPath();
      ctx.moveTo(s * 0.25, -s * 0.5); ctx.lineTo(s * 0.35, -s * 0.72); ctx.lineTo(s * 0.48, -s * 0.5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.42, -s * 0.48); ctx.lineTo(s * 0.52, -s * 0.68); ctx.lineTo(s * 0.62, -s * 0.42);
      ctx.fill();
      // Eyes
      ctx.fillStyle = `rgba(40,40,40,${alpha * 4})`;
      ctx.beginPath(); ctx.arc(s * 0.33, -s * 0.25, s * 0.06, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(s * 0.47, -s * 0.25, s * 0.06, 0, Math.PI * 2); ctx.fill();
    } else {
      // Sit or walk
      ctx.fillStyle = color;
      // Body
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.35, s * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Head
      ctx.beginPath();
      ctx.arc(0, -s * 0.55, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Ears
      ctx.fillStyle = darkerColor;
      ctx.beginPath();
      ctx.moveTo(-s * 0.22, -s * 0.75); ctx.lineTo(-s * 0.1, -s * 1); ctx.lineTo(s * 0.02, -s * 0.72);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.02, -s * 0.75); ctx.lineTo(s * 0.15, -s * 0.98); ctx.lineTo(s * 0.25, -s * 0.72);
      ctx.fill();
      // Eyes
      ctx.fillStyle = `rgba(40,40,40,${alpha * 4})`;
      ctx.beginPath(); ctx.arc(-s * 0.1, -s * 0.58, s * 0.06, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(s * 0.1, -s * 0.58, s * 0.06, 0, Math.PI * 2); ctx.fill();

      // Nose
      ctx.fillStyle = `rgba(255,150,150,${alpha * 3})`;
      ctx.beginPath(); ctx.arc(0, -s * 0.48, s * 0.03, 0, Math.PI * 2); ctx.fill();

      // Mouth
      ctx.strokeStyle = `rgba(40,40,40,${alpha * 3})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-s * 0.06, -s * 0.43); ctx.quadraticCurveTo(0, -s * 0.38, s * 0.06, -s * 0.43);
      ctx.stroke();

      // Whiskers
      ctx.strokeStyle = `rgba(180,180,180,${alpha * 2.5})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(-s * 0.15, -s * 0.5); ctx.lineTo(-s * 0.4, -s * 0.6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-s * 0.15, -s * 0.46); ctx.lineTo(-s * 0.4, -s * 0.44); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s * 0.15, -s * 0.5); ctx.lineTo(s * 0.4, -s * 0.6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(s * 0.15, -s * 0.46); ctx.lineTo(s * 0.4, -s * 0.44); ctx.stroke();

      // Tail — wavy
      const tw = Math.sin(this.t * 0.05 + tailPhase) * s * 0.25;
      ctx.strokeStyle = color;
      ctx.lineWidth = s * 0.1;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-s * 0.1, s * 0.3);
      ctx.quadraticCurveTo(-s * 0.5, s * 0.1 + tw, -s * 0.55, -s * 0.15 + tw * 0.5);
      ctx.stroke();

      if (pose === 'walk') {
        // Legs (animated)
        const legOff = Math.sin(this.t * 0.08 + tailPhase) * s * 0.12;
        ctx.strokeStyle = color;
        ctx.lineWidth = s * 0.08;
        ctx.beginPath(); ctx.moveTo(-s*0.15, s*0.35); ctx.lineTo(-s*0.18, s*0.6 + legOff); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(s*0.15, s*0.35); ctx.lineTo(s*0.18, s*0.6 - legOff); ctx.stroke();
      }
    }

    ctx.restore();
  }

  _darken(hex, factor) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*factor)},${Math.floor(g*factor)},${Math.floor(b*factor)})`;
  }

  draw() {
    const { ctx, canvas } = this;
    this.t++;

    // Warm dark background
    ctx.fillStyle = '#0c0a08';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle paw print watermark pattern
    if (this.t % 90 === 0 && this.paws.length < 30) {
      this.paws.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        s: 6 + Math.random() * 10,
        a: 0.04 + Math.random() * 0.03,
        rot: Math.random() * Math.PI * 2,
      });
    }
    this.paws.forEach(pw => {
      ctx.save();
      ctx.translate(pw.x, pw.y);
      ctx.rotate(pw.rot);
      ctx.fillStyle = `rgba(255,179,71,${pw.a})`;
      // Pad
      ctx.beginPath(); ctx.ellipse(0, 0, pw.s * 0.5, pw.s * 0.4, 0, 0, Math.PI * 2); ctx.fill();
      // Toes
      const toeR = pw.s * 0.18;
      ctx.beginPath(); ctx.arc(-pw.s * 0.3, -pw.s * 0.45, toeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -pw.s * 0.55, toeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(pw.s * 0.3, -pw.s * 0.45, toeR, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    });

    // Draw yarn balls
    this.yarns.forEach(y => {
      y.x += y.speed * y.dir;
      y.roll += y.speed * 0.1;
      if (y.x < -y.r * 2) y.x = canvas.width + y.r;
      if (y.x > canvas.width + y.r * 2) y.x = -y.r;

      ctx.save();
      ctx.translate(y.x, y.y);
      ctx.rotate(y.roll);
      ctx.fillStyle = y.color;
      ctx.globalAlpha = y.alpha;
      ctx.beginPath(); ctx.arc(0, 0, y.r, 0, Math.PI * 2); ctx.fill();
      // Cross-hatch threads
      ctx.strokeStyle = `rgba(255,255,255,0.15)`;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * y.r * 0.8, Math.sin(a) * y.r * 0.8);
        ctx.lineTo(Math.cos(a + Math.PI) * y.r * 0.8, Math.sin(a + Math.PI) * y.r * 0.8);
        ctx.stroke();
      }
      ctx.restore();
    });

    // Move & draw cats
    this.cats.forEach(cat => {
      if (cat.pose === 'walk') {
        cat.x += cat.speed * cat.dir;
        cat.y += cat.drift;
        if (cat.x < -cat.size * 2) cat.x = canvas.width + cat.size;
        if (cat.x > canvas.width + cat.size * 2) cat.x = -cat.size;
        if (cat.y < -cat.size * 2) cat.y = canvas.height + cat.size;
        if (cat.y > canvas.height + cat.size * 2) cat.y = -cat.size;
      }
      cat.phase += 0.005;
      this._drawCat(cat);
    });
  }

  start() {
    const loop = () => { this.draw(); this.raf = requestAnimationFrame(loop); };
    this.raf = requestAnimationFrame(loop);
  }

  stop() {
    cancelAnimationFrame(this.raf);
    this.raf = null;
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  }
}


// ══════════════════════════════════════════════════════════════════════════
//  BACKGROUND CONTROLLER
// ══════════════════════════════════════════════════════════════════════════

const BG_KEY   = 'hours_bg_v1';
let bgMode     = 'none';
let bgEffect   = null;
const bgCanvas = document.getElementById('bg-canvas');

function setBg(mode) {
  if (bgEffect) { bgEffect.stop(); bgEffect = null; }
  bgMode = mode;
  try { localStorage.setItem(BG_KEY, mode); } catch (_) {}

  document.querySelectorAll('.bg-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.bg === mode)
  );

  if (mode === 'none') {
    bgCanvas.classList.remove('visible');
    return;
  }

  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  bgCanvas.classList.add('visible');

  if (mode === 'stars')    bgEffect = new StarWarsBg(bgCanvas);
  if (mode === 'matrix')   bgEffect = new MatrixBg(bgCanvas);
  if (mode === 'killbill') bgEffect = new KillBillBg(bgCanvas);
  if (mode === 'kitty')    bgEffect = new HelloKittyBg(bgCanvas);
  if (mode === 'cats')     bgEffect = new CatsBg(bgCanvas);
  if (bgEffect) bgEffect.start();
}

function loadBg() {
  let saved = 'none';
  try { saved = localStorage.getItem(BG_KEY) || 'none'; } catch (_) {}
  setBg(saved);
}

// Debounced resize handler
let _resizeT = null;
window.addEventListener('resize', () => {
  clearTimeout(_resizeT);
  _resizeT = setTimeout(() => { if (bgEffect && bgEffect.resize) bgEffect.resize(); }, 160);
});

document.getElementById('bg-picker').addEventListener('click', e => {
  const btn = e.target.closest('.bg-btn');
  if (btn) setBg(btn.dataset.bg);
});

  { name: 'red',    hex: '#f87171' },
  { name: 'cyan',   hex: '#22d3ee' },
  { name: 'slate',  hex: '#94a3b8' },
];

// ── Persistence ────────────────────────────────────────────────────────────

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch (_) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) projects = JSON.parse(raw);
  } catch (_) { projects = []; }
  if (!Array.isArray(projects)) projects = [];
}

// ── Helpers ────────────────────────────────────────────────────────────────

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function fmtHours(h) {
  const r = Math.round(h * 10) / 10;
  return r % 1 === 0 ? r.toFixed(0) : r.toFixed(1);
}

function fmtDate(ts) {
  const d = new Date(ts);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function fmtRelative(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days}d ago`;
  return fmtDate(ts);
}

function totalHoursAll() {
  return projects.reduce((acc, p) => acc + p.hours, 0);
}

// ── Toast ──────────────────────────────────────────────────────────────────

let _toastT = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── Render ─────────────────────────────────────────────────────────────────

function sortedProjects() {
  const arr = projects.slice();
  if (currentSort === 'hours') arr.sort((a, b) => b.hours - a.hours);
  if (currentSort === 'alpha') arr.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
  return arr;
}

function render() {
  const list   = document.getElementById('project-list');
  const footer = document.getElementById('footer-bar');
  const stat   = document.getElementById('footer-stat');
  const sortBar = document.getElementById('sort-bar');

  list.innerHTML = '';

  if (projects.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">⏱</span>
        <strong>no projects yet</strong>
        give your time somewhere to live
      </div>`;
    footer.style.display = 'none';
    sortBar.style.display = 'none';
    document.getElementById('chart-section').style.display = 'none';
    return;
  }

  footer.style.display = 'flex';
  sortBar.style.display = 'flex';
  const total = totalHoursAll();
  stat.innerHTML = `<strong>${fmtHours(total)}h</strong> logged across ${projects.length} project${projects.length !== 1 ? 's' : ''}`;

  sortedProjects().forEach(p => {
    const card = document.createElement('div');
    card.className  = 'project-card';
    card.dataset.id = p.id;

    const last   = p.history && p.history.length > 0 ? p.history[p.history.length - 1] : null;
    const canUndo = !!last;
    const lastDate = last && last.ts ? fmtDate(last.ts) : null;
    const pColor = p.color || TAG_COLORS[0].hex;

    card.innerHTML = `
      <div class="card-top">
        <span class="color-dot" data-id="${p.id}" style="background:${pColor}" title="Click to change color"></span>
        <span class="project-name" title="${escHtml(p.name)}">${escHtml(p.name)}</span>
        <span>
          <span class="hours-display">${fmtHours(p.hours)}</span>
          <span class="hours-unit">h</span>
        </span>
      </div>
      <div class="card-actions">
        <button class="btn-hour" data-id="${p.id}" data-delta="1"   title="Log 1 hour">+1h</button>
        <button class="btn-hour" data-id="${p.id}" data-delta="0.5" title="Log 30 min">+½h</button>
        <input class="custom-hour-input" data-id="${p.id}" type="number" step="0.5" min="0.5" placeholder="h" title="Custom hours" />
        <button class="btn-log-custom" data-id="${p.id}" title="Log custom hours">+log</button>
        <span class="spacer"></span>
        <button class="btn-edit"   data-id="${p.id}" title="Rename">✎</button>
        <button class="btn-danger" data-id="${p.id}" title="Delete">✕</button>
      </div>
      <div class="note-row">
        <input class="note-input" data-id="${p.id}" type="text" placeholder="note (optional)..." maxlength="120" spellcheck="false" />
      </div>
      ${lastDate ? `<div class="last-logged">last logged: ${lastDate}</div>` : ''}
      <div class="undo-hint ${canUndo ? 'visible' : ''}" id="undo-${p.id}">
        ${canUndo ? `+${last.delta}h ${fmtRelative(last.ts)}${last.note ? ` — "${escHtml(last.note)}"` : ''} — <span class="undo-link" data-id="${p.id}">oops, undo</span>` : ''}
      </div>`;

    card.style.borderLeft = `3px solid ${pColor}`;

    list.appendChild(card);
  });

  renderChart();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Project ops ────────────────────────────────────────────────────────────

function addProject(name) {
  name = name.trim();
  if (!name) return false;
  if (projects.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    showToast('you already have that one 👀'); return false;
  }
  const color = TAG_COLORS[projects.length % TAG_COLORS.length].hex;
  projects.unshift({ id: uid(), name, hours: 0, history: [], color });
  save(); render();
  showToast(`"${name}" is ready to absorb your time`);
  return true;
}

function logHours(id, delta, note) {
  const p = projects.find(p => p.id === id);
  if (!p) return;
  p.hours = Math.round((p.hours + delta) * 10) / 10;
  p.history = p.history || [];
  const entry = { delta, ts: Date.now() };
  if (note) entry.note = note;
  p.history.push(entry);
  save();

  const card = document.querySelector(`.project-card[data-id="${id}"]`);
  if (!card) return;
  card.classList.remove('bump');
  void card.offsetWidth;
  card.classList.add('bump');

  const disp = card.querySelector('.hours-display');
  if (disp) disp.textContent = fmtHours(p.hours);

  const hint = card.querySelector('.undo-hint');
  if (hint) {
    const noteText = note ? ` — "${escHtml(note)}"` : '';
    hint.innerHTML = `+${delta}h just now${noteText} — <span class="undo-link" data-id="${id}">oops, undo</span>`;
    hint.classList.add('visible');
  }

  // Clear note input
  const noteInput = card.querySelector('.note-input');
  if (noteInput) noteInput.value = '';

  // Update last-logged date inline
  let dateLine = card.querySelector('.last-logged');
  if (!dateLine) {
    dateLine = document.createElement('div');
    dateLine.className = 'last-logged';
    const noteRow = card.querySelector('.note-row');
    if (noteRow) noteRow.after(dateLine);
  }
  dateLine.textContent = `last logged: ${fmtDate(Date.now())}`;

  const stat = document.getElementById('footer-stat');
  if (stat) {
    const total = totalHoursAll();
    stat.innerHTML = `<strong>${fmtHours(total)}h</strong> logged across ${projects.length} project${projects.length !== 1 ? 's' : ''}`;
  }

  renderChart();
}

function undoLast(id) {
  const p = projects.find(p => p.id === id);
  if (!p || !p.history || !p.history.length) return;
  const last = p.history.pop();
  p.hours = Math.max(0, Math.round((p.hours - last.delta) * 10) / 10);
  save(); render();
  showToast(`undone — ${last.delta}h taken back from "${p.name}"`);
}

function deleteProject(id) {
  const idx = projects.findIndex(p => p.id === id);
  if (idx === -1) return;
  const name = projects[idx].name;
  projects.splice(idx, 1);
  save(); render();
  showToast(`"${name}" is gone. goodbye forever.`);
}

function renameProject(id, newName) {
  newName = newName.trim();
  if (!newName) return;
  const p = projects.find(p => p.id === id);
  if (!p || p.name === newName) return;
  p.name = newName;
  save(); render();
}

// ── Inline edit ────────────────────────────────────────────────────────────

function startEdit(id) {
  const card  = document.querySelector(`.project-card[data-id="${id}"]`);
  const nameEl = card && card.querySelector('.project-name');
  const p      = projects.find(p => p.id === id);
  if (!nameEl || !p) return;

  const inp = document.createElement('input');
  inp.type      = 'text';
  inp.className = 'project-name-input';
  inp.value     = p.name;
  inp.maxLength = 64;
  inp.spellcheck = false;
  nameEl.replaceWith(inp);
  inp.focus(); inp.select();

  function commit() {
    const val  = inp.value.trim() || p.name;
    const span = document.createElement('span');
    span.className = 'project-name';
    span.title = val; span.textContent = val;
    inp.replaceWith(span);
    renameProject(id, val);
  }

  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = p.name; inp.blur(); }
  });
}

// ── Export / Import ────────────────────────────────────────────────────────

function exportJSON() {
  const blob = new Blob(
    [JSON.stringify({ exported: new Date().toISOString(), projects }, null, 2)],
    { type: 'application/json' }
  );
  const url = URL.createObjectURL(blob);
  const a   = Object.assign(document.createElement('a'), {
    href: url, download: `hours-backup-${new Date().toISOString().slice(0,10)}.json`
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  showToast('backed up. good instincts.');
}

function exportCSV() {
  const csvEsc = s => `"${String(s).replace(/"/g, '""')}"`;
  const rows = [['project','date','hours','note']];
  projects.forEach(p => {
    if (!p.history || p.history.length === 0) {
      rows.push([p.name, '', fmtHours(p.hours), '']);
    } else {
      p.history.forEach(h => {
        const d = h.ts ? new Date(h.ts).toISOString().slice(0, 10) : '';
        rows.push([p.name, d, h.delta, h.note || '']);
      });
    }
  });
  const csv = rows.map(r => r.map(csvEsc).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), {
    href: url, download: `hours-${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  showToast('csv exported. spreadsheet time.');
}

function importJSON(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const parsed   = JSON.parse(e.target.result);
      const incoming = parsed.projects || (Array.isArray(parsed) ? parsed : null);
      if (!incoming) throw new Error();
      const map = Object.fromEntries(projects.map(p => [p.id, p]));
      incoming.forEach(p => { if (p.id && p.name != null) map[p.id] = p; });
      projects = Object.values(map);
      save(); render();
      showToast(`imported ${incoming.length} project(s) — welcome back`);
    } catch (_) { showToast('hmm, that JSON looked a bit off'); }
  };
  r.readAsText(file);
}

// ── Delete confirm ─────────────────────────────────────────────────────────

function openConfirm(id) {
  const p = projects.find(p => p.id === id);
  if (!p) return;
  pendingDeleteId = id;
  document.getElementById('confirm-name').textContent = `"${p.name}"`;
  document.getElementById('overlay').classList.add('open');
}

function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('overlay').classList.remove('open');
}

// ── Color cycle ────────────────────────────────────────────────────────────

function cycleColor(id) {
  const p = projects.find(p => p.id === id);
  if (!p) return;
  const currentIdx = TAG_COLORS.findIndex(c => c.hex === p.color);
  const nextIdx = (currentIdx + 1) % TAG_COLORS.length;
  p.color = TAG_COLORS[nextIdx].hex;
  save();
  const card = document.querySelector(`.project-card[data-id="${id}"]`);
  if (card) {
    const dot = card.querySelector('.color-dot');
    if (dot) dot.style.background = p.color;
    card.style.borderLeftColor = p.color;
  }
  renderChart();
}

// ── Chart ──────────────────────────────────────────────────────────────────

function dayKey(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function weekKey(ts) {
  const d = new Date(ts);
  const day = d.getDay() || 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - day + 1);
  return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`;
}

function renderChart() {
  const section   = document.getElementById('chart-section');
  const container = document.getElementById('chart-container');
  const hasHistory = projects.some(p => p.history && p.history.length > 0);

  if (projects.length === 0 || !hasHistory) {
    section.style.display = 'none';
    return;
  }
  section.style.display = 'block';

  const now = new Date();
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let buckets = [], labels = [];

  if (chartRange === 'week') {
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      buckets.push(dayKey(d.getTime()));
      labels.push(i === 0 ? 'today' : dayNames[d.getDay()]);
    }
  } else {
    for (let i = 3; i >= 0; i--) {
      const d = new Date(now); d.setDate(d.getDate() - i * 7);
      buckets.push(weekKey(d.getTime()));
      labels.push(i === 0 ? 'this wk' : `${i}w ago`);
    }
  }

  const keyFn = chartRange === 'week' ? dayKey : weekKey;
  const data = buckets.map(bk => {
    const segments = [];
    projects.forEach(p => {
      const hrs = (p.history || [])
        .filter(h => keyFn(h.ts) === bk)
        .reduce((sum, h) => sum + h.delta, 0);
      if (hrs > 0) segments.push({ name: p.name, color: p.color || TAG_COLORS[0].hex, hours: hrs });
    });
    return { key: bk, segments, total: segments.reduce((s, seg) => s + seg.hours, 0) };
  });

  const maxHours = Math.max(0.5, ...data.map(d => d.total));
  const maxBarH  = 90;

  // Collect legend entries (projects that appear in chart)
  const legendSet = new Map();
  data.forEach(col => col.segments.forEach(seg => { if (!legendSet.has(seg.name)) legendSet.set(seg.name, seg.color); }));

  const barsHtml = data.map((col, i) => {
    const segsHtml = col.segments.map(seg => {
      const h = Math.max(2, (seg.hours / maxHours) * maxBarH);
      return `<div class="chart-seg" style="height:${h}px;background:${seg.color}" title="${escHtml(seg.name)}: ${fmtHours(seg.hours)}h"></div>`;
    }).join('');
    const totalLabel = col.total > 0 ? `${fmtHours(col.total)}h` : '';
    return `<div class="chart-col">
      <span class="chart-total">${totalLabel}</span>
      <div class="chart-bar" style="height:${maxBarH}px">${segsHtml}</div>
      <span class="chart-label">${labels[i]}</span>
    </div>`;
  }).join('');

  const legendHtml = legendSet.size > 0 ? `<div class="chart-legend">${
    Array.from(legendSet).map(([name, color]) =>
      `<span class="chart-legend-item"><span class="chart-legend-dot" style="background:${color}"></span>${escHtml(name)}</span>`
    ).join('')
  }</div>` : '';

  if (data.every(d => d.total === 0)) {
    container.innerHTML = `<div class="chart-empty">no hours logged in this period</div>`;
  } else {
    container.innerHTML = barsHtml + legendHtml;
  }
}

// ── Event wiring ───────────────────────────────────────────────────────────

document.getElementById('project-list').addEventListener('click', e => {
  const t = e.target;
  if (t.classList.contains('btn-hour')) {
    const card = t.closest('.project-card');
    const noteInput = card && card.querySelector('.note-input');
    const note = noteInput ? noteInput.value.trim() : '';
    logHours(t.dataset.id, parseFloat(t.dataset.delta), note);
  }
  else if (t.classList.contains('btn-log-custom')) {
    const card  = t.closest('.project-card');
    const input = card && card.querySelector('.custom-hour-input');
    const noteInput = card && card.querySelector('.note-input');
    const note = noteInput ? noteInput.value.trim() : '';
    if (input) {
      const val = parseFloat(input.value);
      if (val > 0 && val <= 24) { logHours(t.dataset.id, Math.round(val * 10) / 10, note); input.value = ''; }
      else { showToast('enter a value between 0.5 and 24'); input.focus(); }
    }
  }
  else if (t.classList.contains('undo-link'))  undoLast(t.dataset.id);
  else if (t.classList.contains('btn-edit'))   startEdit(t.dataset.id);
  else if (t.classList.contains('btn-danger')) openConfirm(t.dataset.id);
  else if (t.classList.contains('color-dot'))  cycleColor(t.dataset.id);
});

document.getElementById('project-list').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('custom-hour-input')) {
    const card = e.target.closest('.project-card');
    const btn  = card && card.querySelector('.btn-log-custom');
    if (btn) btn.click();
  }
});

document.getElementById('add-btn').addEventListener('click', () => {
  const inp = document.getElementById('project-input');
  if (addProject(inp.value)) inp.value = '';
  inp.focus();
});

document.getElementById('project-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (addProject(e.target.value)) e.target.value = '';
  }
});

document.getElementById('confirm-delete').addEventListener('click', () => {
  if (pendingDeleteId) deleteProject(pendingDeleteId);
  closeConfirm();
});

document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeConfirm();
});

document.getElementById('export-btn').addEventListener('click', exportJSON);
document.getElementById('export-csv-btn').addEventListener('click', exportCSV);

document.getElementById('import-btn').addEventListener('click', () =>
  document.getElementById('import-file').click()
);

document.getElementById('import-file').addEventListener('change', e => {
  importJSON(e.target.files[0]);
  e.target.value = '';
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConfirm(); });

document.getElementById('sort-bar').addEventListener('click', e => {
  const btn = e.target.closest('.sort-btn');
  if (!btn) return;
  currentSort = btn.dataset.sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
});

document.getElementById('chart-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.chart-toggle-btn');
  if (!btn) return;
  chartRange = btn.dataset.range;
  document.querySelectorAll('.chart-toggle-btn').forEach(b => b.classList.toggle('active', b === btn));
  renderChart();
});

// ── Boot ───────────────────────────────────────────────────────────────────

load();
render();
loadBg(); // restore last chosen background

// Fetch commit ID from GitHub API
function loadCommitId() {
  const versionTag = document.getElementById('version-tag');
  if (!versionTag) return;
  
  // Set to 'main' or 'master' depending on your default branch
  const branch = 'main';
  const repoPath = 'cool-sandro/tracker'; // Update with your username/repo
  
  fetch(`https://api.github.com/repos/${repoPath}/commits/${branch}`)
    .then(r => r.json())
    .then(data => {
      if (data.sha) {
        const shortId = data.sha.slice(0, 7);
        versionTag.href = `https://github.com/${repoPath}/commit/${data.sha}`;
        versionTag.textContent = shortId;
        versionTag.title = `Commit ${data.sha}`;
        versionTag.target = '_blank';
        versionTag.rel = 'noopener noreferrer';
      }
    })
    .catch(() => {}); // Silently fail if API is unavailable
}

loadCommitId();
